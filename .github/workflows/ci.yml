name: CI

on:
  push:
    branches:
      - main
      - codex/dev
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r scripts/python/requirements.txt

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Dependency boundaries
        run: npm run lint:deps

      - name: Formatter export snapshot
        run: npm run check:formatter-exports

      - name: Architecture baseline reminder
        run: npm run check:docs-diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}

      - name: Test
        run: npm test
