name: Docs
description: 补充、修正文档或示例
title: "[Docs] "
labels: ["documentation"]
body:
  - type: textarea
    id: background
    attributes:
      label: 背景
      description: 哪份文档、说明或示例需要调整？
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 问题 / 需求
      description: 当前文档哪里缺失、过期或容易误解？
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望内容
      description: 希望补充或改成什么？
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 验收标准
      placeholder: |
        - [ ] ...
        - [ ] ...

